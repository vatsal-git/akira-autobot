# LiteLLM Router model list: use model_name aliases from the app (DEFAULT_MODEL, chat settings.model).
# litellm_params.model is the LiteLLM route (openrouter/..., bedrock/...).
# ${ENV} placeholders are substituted at load time from the process environment.

settings:
  default_model: anthropic
  agi_task_routing: true
  # Ordered fallbacks on rate limit / payment errors (model_name aliases).
  fallback_order:
    - anthropic
    - openrouter-gemini-flash-lite
    - openrouter-qwen-flash

model_list:
  - model_name: openrouter-gemini-flash-lite
    litellm_params:
      model: openrouter/google/gemini-2.5-flash-lite
      api_key: ${OPENROUTER_API_KEY}

  - model_name: openrouter-qwen-flash
    litellm_params:
      model: openrouter/qwen/qwen3.5-flash-02-23
      api_key: ${OPENROUTER_API_KEY}

  - model_name: anthropic
    litellm_params:
      model: bedrock/${CLAUDE_INFERENCE_PROFILE}
      aws_region_name: ${AWS_REGION}
