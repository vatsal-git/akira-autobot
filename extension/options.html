<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Akira — extension settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">Akira</h1>
      <p class="subtitle">Make it you own</p>
      <p class="lead">Where your chat app runs (same as opening it in a normal tab).</p>
      <label class="field">
        <span class="label">App URL</span>
        <input
          id="url"
          type="url"
          inputmode="url"
          autocomplete="url"
          placeholder="http://localhost:5173"
        />
      </label>
      <p class="hint">Dev: start the Vite app (<code>npm run dev</code> in <code>frontend/</code>) and keep the backend on port 8000. Production: use the URL where you host the built UI.</p>
      <button type="button" id="save" class="primary">Save</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
